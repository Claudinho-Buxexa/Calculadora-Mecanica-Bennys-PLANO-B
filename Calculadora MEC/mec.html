<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecânica Milanos | Sistema de Gestão</title>
    <style>
        :root {
            --primary: #d90429;
            --bg: #0b0c10;
            --card: #1f2833;
            --text: #ffffff;
            --success: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 2px solid var(--primary);
        }

        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-area h1 { margin: 0; font-size: 26px; text-transform: uppercase; font-style: italic; }
        .logo-area span { color: var(--primary); }

        /* BOTÕES DE SERVIÇO */
        .grid-buttons { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .btn-service {
            background-color: #2c3e50;
            border: 1px solid #444;
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-service:hover { background-color: #34495e; border-color: var(--primary); transform: scale(1.02); }
        .btn-service:active { transform: scale(0.98); }
        .price-tag { background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px; font-size: 13px; color: var(--success); }

        /* SEÇÃO DE DESCONTOS */
        .discount-area { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .discount-title { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 10px; text-align: center; font-weight: bold; }
        .discount-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-discount {
            background: #161b22;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
        .btn-discount.active { background: var(--primary); color: white; border-color: white; }

        /* RESULTADO FINAL */
        .result-area {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #333;
            text-align: center;
        }
        .total-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .total-value { font-size: 38px; font-weight: 900; color: var(--success); margin: 5px 0; }
        
        .summary { font-size: 13px; color: #888; margin-bottom: 10px; min-height: 20px; }

        .btn-reset {
            width: 100%;
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-reset:hover { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <h1>Mecânica <span>Milanos</span></h1>
    </div>

    <div class="grid-buttons">
        <button class="btn-service" onclick="addItem('Reparo', 1500)">Reparo <span class="price-tag">+ R$ 1.500</span></button>
        <button class="btn-service" onclick="addItem('Pintura', 2000)">Pintura <span class="price-tag">+ R$ 2.000</span></button>
        <button class="btn-service" onclick="addItem('Full Tuning S/B', 100000)">Full Tuning S/B <span class="price-tag">+ R$ 100.000</span></button>
        <button class="btn-service" onclick="addItem('Full Tuning C/B', 120000)">Full Tuning C/B <span class="price-tag">+ R$ 120.000</span></button>
        <button class="btn-service" onclick="addItem('Alt./Pneu', 1000)">Alt./Pneu <span class="price-tag">+ R$ 1.000</span></button>
    </div>

    <div class="discount-area">
        <div class="discount-title">Aplicar Desconto Especial</div>
        <div class="discount-grid">
            <button class="btn-discount" id="desc5" onclick="setDiscount(0.05, 'desc5')">FACÇÃO (5%)</button>
            <button class="btn-discount" id="desc10" onclick="setDiscount(0.10, 'desc10')">POLÍCIA (10%)</button>
            <button class="btn-discount" id="desc15" onclick="setDiscount(0.15, 'desc15')">CHEFES (15%)</button>
        </div>
    </div>

    <div class="result-area">
        <div id="itemCount" class="summary">Nenhum item adicionado</div>
        <div class="total-label">Total a Receber</div>
        <div class="total-value" id="totalDisplay">R$ 0</div>
        <button class="btn-reset" onclick="resetAll()">Limpar Tudo</button>
    </div>
</div>

<script>
    let subtotal = 0;
    let discountRate = 0;
    let itemsQuantity = 0;

    function addItem(name, value) {
        subtotal += value;
        itemsQuantity++;
        updateDisplay();
    }

    function setDiscount(rate, btnId) {
        // Se clicar no desconto que já está ativo, ele remove o desconto
        if (discountRate === rate) {
            discountRate = 0;
            document.getElementById(btnId).classList.remove('active');
        } else {
            // Remove ativo de todos e coloca no novo
            document.querySelectorAll('.btn-discount').forEach(btn => btn.classList.remove('active'));
            discountRate = rate;
            document.getElementById(btnId).classList.add('active');
        }
        updateDisplay();
    }

    function updateDisplay() {
        const totalComDesconto = subtotal - (subtotal * discountRate);
        
        document.getElementById('totalDisplay').innerText = `R$ ${totalComDesconto.toLocaleString('pt-BR')}`;
        document.getElementById('itemCount').innerText = `${itemsQuantity} serviço(s) no orçamento`;
    }

    function resetAll() {
        subtotal = 0;
        discountRate = 0;
        itemsQuantity = 0;
        document.querySelectorAll('.btn-discount').forEach(btn => btn.classList.remove('active'));
        updateDisplay();
        document.getElementById('itemCount').innerText = "Nenhum item adicionado";
    }
</script>

</body>
</html>
